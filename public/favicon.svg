<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="hubGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1e293b" stroke="url(#hubGradient)" stroke-width="2"/>
  
  <!-- Hub icon - central node with connections -->
  <circle cx="16" cy="16" r="3" fill="url(#hubGradient)"/>
  
  <!-- Connection points -->
  <circle cx="16" cy="6" r="2" fill="#f59e0b"/>
  <circle cx="26" cy="16" r="2" fill="#6366f1"/>
  <circle cx="16" cy="26" r="2" fill="#f59e0b"/>
  <circle cx="6" cy="16" r="2" fill="#6366f1"/>
  
  <!-- Connection lines -->
  <line x1="16" y1="16" x2="16" y2="6" stroke="url(#hubGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="16" x2="26" y2="16" stroke="url(#hubGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="16" x2="16" y2="26" stroke="url(#hubGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="16" x2="6" y2="16" stroke="url(#hubGradient)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Project text -->
  <text x="16" y="28" font-family="Arial, sans-serif" font-size="4" font-weight="bold" text-anchor="middle" fill="url(#hubGradient)">PH</text>
</svg>
